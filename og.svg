  <text x="620" y="250" fill="#fafafa" font-family="system-ui,sans-serif" font-size="64" font-weight="800">MO Avatar Generator</text>
  <text x="620" y="330" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="34" font-weight="500">Animated developer profile avatars</text>
